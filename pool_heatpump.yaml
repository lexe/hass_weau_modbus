esphome:
  name: pool-heatpump
  friendly_name: Pool Heatpump
  on_boot:
    then:
      - light.turn_on:
          id: status_led
          brightness: 25%
          red: 0%
          green: 100%
          blue: 0%  

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  logs:
    modbus_controller.sensor: INFO
    modbus_controller.output: INFO
    modbus.number: INFO
    esp32.preferences: INFO
    light: INFO
    component: ERROR

# Enable Home Assistant API
api:
  encryption:
    key: "your_api_key"

ota:
  - platform: esphome
    password: "your_password"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# webserver
web_server:
  port: 80
  version: 3
  include_internal: False
  local: True
  sorting_groups:
    - id: Control
      name: "Control"
      sorting_weight: -40
    - id: Parameters
      name: "Parameters"
      sorting_weight: -30
    - id: Status
      name: "Status"
      sorting_weight: -20
    - id: Diagnostic
      name: "Diagnostic"  
      sorting_weight: -10

# light
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO27
    num_leds: 1
    chipset: SK6812
    id: status_led
    name: RGB LED

# modbus
uart:
  id: uart_bus
  tx_pin: GPIO19
  rx_pin: GPIO22
  baud_rate: 9600
  data_bits: 8    
  stop_bits: 1
  parity: NONE
  #rx_buffer_size: 256         # min. 256 recommended; increase for very long RTU responses

modbus:
  - uart_id: uart_bus
    id: modbus1
    send_wait_time: 100ms

modbus_controller:
  - id: hp
    address: 0x1
    modbus_id: modbus1
    #command_throttle: 20ms
    update_interval: 1s  
    setup_priority: -10

# sensors
sensor:

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C01 Ambient temperature"
    address: 0
    value_type: S_WORD
    unit_of_measurement: C°
    accuracy_decimals: 1
    filters:
      - multiply: 0.1   
    web_server:
      sorting_group_id: Status                

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C02 Evaporator coil temperature"
    address: 1
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic    
    unit_of_measurement: C°
    accuracy_decimals: 1
    filters:
      - multiply: 0.1           

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C03 Exhaust temperature"
    address: 2
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic   
    unit_of_measurement: C°
    accuracy_decimals: 1
    filters:
      - multiply: 0.1             

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C04 Return temperature"
    address: 3
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic   
    unit_of_measurement: C°
    accuracy_decimals: 1
    filters:
      - multiply: 0.1                 

  - platform: modbus_controller
    modbus_controller_id: hp
    id: t_environment
    name: "C07 Titanium heat exchanger temperature"
    register_type: holding
    address: 6
    value_type: S_WORD   
    unit_of_measurement: C°
    accuracy_decimals: 1
    filters:
      - multiply: 0.1  
    web_server:
      sorting_group_id: Diagnostic

  - platform: modbus_controller
    modbus_controller_id: hp
    name: "C08 Inlet temperature"
    id: hp_in
    register_type: holding
    address: 7
    value_type: S_WORD   
    unit_of_measurement: C°
    device_class: temperature
    accuracy_decimals: 1
    filters:
      - multiply: 0.1    
    web_server:
      sorting_group_id: Status      

  - platform: modbus_controller
    modbus_controller_id: hp
    id: t_out
    name: "C09 Outlet temperature"
    register_type: holding
    address: 8
    value_type: S_WORD 
    unit_of_measurement: C°
    accuracy_decimals: 1  
    filters:
      - multiply: 0.1   
    web_server:
      sorting_group_id: Status

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C13 Temperature sensor failure"
    address: 12
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic 

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C14 Refrigerant system failure"
    address: 13
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C15 Inverter driver failure"
    address: 14
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C16 Device output" # binaire code?
    id: c16
    address: 15
    value_type: U_WORD
    web_server:
      sorting_group_id: Diagnostic       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C17 Running status"
    address: 16
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic 

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C18 AC voltage"
    address: 17
    value_type: S_WORD
    unit_of_measurement: V
    web_server:
      sorting_group_id: Diagnostic       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C19 DC voltage"
    address: 18
    value_type: S_WORD
    unit_of_measurement: V
    web_server:
      sorting_group_id: Diagnostic       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C20 Actual frequency"
    address: 19
    value_type: S_WORD
    unit_of_measurement: Hz
    web_server:
      sorting_group_id: Status       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C21 EEV open degree"
    address: 20
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic     

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C23 Heat pump current"
    address: 22
    value_type: S_WORD
    unit_of_measurement: A
    accuracy_decimals: 1  
    filters:
      - multiply: 0.1       
    web_server:
      sorting_group_id: Status       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C24 Compressor current"
    address: 23
    value_type: S_WORD
    unit_of_measurement: A
    accuracy_decimals: 1  
    filters:
      - multiply: 0.1      
    web_server:
      sorting_group_id: Status        

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C25 DC fan motor1 speed"
    address: 24
    value_type: S_WORD
    unit_of_measurement: rpm
    web_server:
      sorting_group_id: Status 

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "C26 Compressor target frequency"
    address: 25
    value_type: S_WORD
    unit_of_measurement: Hz
    web_server:
      sorting_group_id: Diagnostic       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: C27
    address: 26
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic       

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: C28
    address: 27
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic        

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: C29
    address: 28
    value_type: S_WORD
    web_server:
      sorting_group_id: Diagnostic 

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: C30 runtime
    address: 29
    value_type: U_WORD
    unit_of_measurement: s
    web_server:
      sorting_group_id: Diagnostic

binary_sensor:

  - platform: modbus_controller
    modbus_controller_id: hp
    name: "C16 Heat pump enabled"
    register_type: holding
    address: 15
    bitmask: 0x0040

  - platform: modbus_controller
    modbus_controller_id: hp
    name: "C16 Frost protection"
    register_type: holding
    address: 15
    bitmask: 0x0100   

select:

  - platform: modbus_controller
    modbus_controller_id: hp
    name: "Heatpump mode"
    id: hp_mode
    address: 30
    optionsmap:
      "Off": 0
      "Eco": 1
      "Boost": 2
    web_server:
      sorting_group_id: Parameters

  - platform: modbus_controller
    modbus_controller_id: hp
    name: "P05 disable heat pump when temperature reached"
    address: 35
    optionsmap:
      "No": 1
      "Yes": 0
    web_server:
      sorting_group_id: Parameters      

number:

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "P01 setpoint heating"
    id: hp_setpoint
    address: 31
    value_type: S_WORD
    min_value: 8
    max_value: 40
    step: 1
    web_server:
      sorting_group_id: Parameters   

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "P02 setpoint cooling"
    address: 32
    value_type: S_WORD
    min_value: 8
    max_value: 28
    step: 1    
    web_server:
      sorting_group_id: Parameters    

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "P03 setpoint auto"
    address: 33
    value_type: S_WORD
    min_value: 8
    max_value: 40
    step: 1    
    web_server:
      sorting_group_id: Parameters    

  - platform: modbus_controller
    modbus_controller_id: hp
    register_type: holding
    name: "P04 water temperature difference before restart"
    address: 34
    value_type: S_WORD
    min_value: 1
    max_value: 18
    step: 1    
    web_server:
      sorting_group_id: Parameters  
